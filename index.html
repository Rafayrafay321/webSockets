<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        font-family: sans-serif;
        padding: 20px;
        background: #121212;
        color: #fff;
      }
      .status_on {
        color: chartreuse;
      }
      .status-off {
        color: #ff0000;
      }
      #log {
        background: #000;
        overflow-y: scroll;
        padding: 10px;
        height: 300px;
      }
    </style>
  </head>
  <body>
    <h1>Web Socket Boardcast Console</h1>
    <p id="status" class="status-off">Connecting...</p>

    <form id="message-form" action="">
      <input id="message-input" type="text" placeholder="Enter your message" />
      <button type="submit">Deploy Message</button>
    </form>
    <h2>Live stream logs</h2>
    <pre id="log"></pre>

    <script>
      const statusEl = document.getElementById("status");
      const inputEl = document.getElementById("message-input");
      const log = document.getElementById("log");

      //   Initialize connection:
      const Socket = new WebSocket("ws://localhost:8080");

      const addLog = (label, message) => {
        const newLog = `${new Date().toLocaleString()} ${label} ${message} \n`;
        log.innerText += newLog;
      };

      //   Change to connected when connects to server
      Socket.addEventListener("open", (e) => {
        if (Socket.readyState === WebSocket.OPEN) {
          statusEl.className = "status_on";
          statusEl.innerText = "Connected";
          addLog("[SYSTEM]", "Connection Established");
        }
      });

      Socket.addEventListener("close", (e) => {
        statusEl.className = "status-off";
        statusEl.innerText = "Disconnected";
        addLog("[SYSTEM]", "Connection Disconnected");
      });

      Socket.addEventListener("message", (e) => {
        addLog("[RECEIVED]", e.data);
      });

      document
        .getElementById("message-form")
        .addEventListener("submit", (e) => {
          e.preventDefault();

          if (Socket.readyState !== WebSocket.OPEN)
            addLog("[ERROR]", "Connection is not established");

          const msg = inputEl.value.trim();
          Socket.send(msg);

          inputEl = "";
        });
    </script>
  </body>
</html>
